spring:
  application:
    name: ai-secure-rag-engine
  profiles:
    active: dev
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/rag-engine}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.0
      connection-timeout: 5s
      read-timeout: 10s

app:
  llm:
    provider: openai   # stub | openai

  rag:
    min-score-threshold: 0.95
    default-top-k: 3
    max-top-k: 20
    rate-limit:
      query-requests-per-minute: 20
      ingest-requests-per-minute: 10

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
