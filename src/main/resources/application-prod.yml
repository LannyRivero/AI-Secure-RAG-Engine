# Production profile
# All sensitive values MUST be provided via environment variables.
# The application will fail fast on startup if any required variable is missing.
#
# Required environment variables:
#   DB_URL        — JDBC URL            e.g. jdbc:postgresql://db-host:5432/rag_engine
#   DB_USERNAME   — Database user
#   DB_PASSWORD   — Database password
#   OPENAI_API_KEY — OpenAI API key     (defined in application.yaml, must be set)

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

logging:
  level:
    root: WARN
    com.lanny.ailab: INFO