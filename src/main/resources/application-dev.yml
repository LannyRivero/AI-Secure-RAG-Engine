spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/${POSTGRES_DB:ai_lab}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  logging:
  level:
    root: INFO
    com.lanny.ailab: DEBUG
    org.springframework.security: DEBUG